
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AceIt - AI Mock Interview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617;
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
        }

        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-color: #020617;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,80%,15%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,80%,20%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,80%,20%,1) 0, transparent 50%), 
                radial-gradient(at 0% 100%, hsla(180,80%,15%,1) 0, transparent 50%), 
                radial-gradient(at 50% 100%, hsla(253,80%,15%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(225,80%,20%,1) 0, transparent 50%);
            background-attachment: fixed;
            opacity: 0.8;
        }

        .glass-dark {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .text-gradient {
            background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-vibrant {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            background-size: 200% 200%;
            animation: gradient-shift 5s ease infinite;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
            border: none;
        }

        .btn-vibrant:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 12px 30px rgba(168, 85, 247, 0.6);
            filter: brightness(1.1);
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .recording-glow {
            box-shadow: 0 0 30px rgba(244, 63, 94, 0.6);
            animation: glow-pulse 2s infinite;
        }

        @keyframes glow-pulse {
            0% { box-shadow: 0 0 10px rgba(244, 63, 94, 0.4); }
            50% { box-shadow: 0 0 30px rgba(244, 63, 94, 0.8); }
            100% { box-shadow: 0 0 10px rgba(244, 63, 94, 0.4); }
        }

        .neon-card {
            position: relative;
            overflow: hidden;
        }

        .neon-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #818cf8);
            animation: rotate 4s linear infinite;
            z-index: -1;
            opacity: 0.15;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Recharts Tooltip Customization */
        .recharts-default-tooltip {
            background-color: rgba(15, 23, 42, 0.9) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            backdrop-filter: blur(8px) !important;
        }
    </style>
<script type="importmap">
{

  }
}
</script>

</head>
